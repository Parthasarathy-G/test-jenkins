name: Basic CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python syntax
        run: python -m py_compile test.py

      - name: Run script
        run: python test.py
